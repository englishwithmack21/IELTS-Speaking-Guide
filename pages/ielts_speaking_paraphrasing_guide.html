    ["Basically, [simple summary].","Simplify a complex point"],
    ["The point is, [main claim].","Foreground the key argument"],
    ["Or rather, [correction].","Repair a slightly inaccurate statement"],
    ["To put it simply, [condensed version].","Clarify a technical or abstract idea"],
  ],
  examples:[
    {t:"Technology",o:"It has a big impact on society.",p:"It has a big impact on society — what I mean is, it's changed the way we communicate and stay connected.",n:"Clarification: vague 'big impact' → specific example added"},
    {t:"Work–life",o:"Balance is necessary.",p:"Balance is necessary — in other words, working too much without rest leads directly to burnout.",n:"Restatement: abstract claim → concrete consequence"},
    {t:"Education",o:"Access is the priority.",p:"The main point is that every child, regardless of background, should have equal access to quality education.",n:"Emphasis: short claim → full, developed expansion"},
    {t:"Habits",o:"I go running every day.",p:"I go running every day — I mean, almost every day — maybe four or five times a week.",n:"Repair: overclaim corrected mid-sentence, naturally"},
    {t:"Environment",o:"Pollution is a complex issue.",p:"Pollution is a complex issue — to put it simply, it affects both health and the economy in ways that are difficult to separate.",n:"Simplification: complex → concrete, accessible restatement"},
  ],
  pitfalls:[
    {l:"Fillers without function",d:"'Like, you know, basically…' without following up with an actual reformulation is just noise. Every marker must introduce a genuine restatement, not more vague content."},
    {l:"Wrong use of 'In other words'",d:"'In other words' must be followed by the SAME core idea rephrased — not a new, different point. Using it to change topic is a coherence error the examiner will notice."},
    {l:"Overusing 'basically'",d:"Once or twice per answer is appropriate. Repeating 'basically' every sentence suggests limited reformulation range and sounds like a filler habit."},
    {l:"Hedges in formal Part 3 contexts",d:"'Kind of' and 'sort of' are appropriate in informal Part 1, but sound imprecise in Part 3 discussions on complex topics. Use 'to some extent' or 'in a sense' instead."},
  ],

    {n:"Two-line restate",i:"Speak one sentence about a topic. Immediately follow it with 'In other words, …' and restate the same idea differently. Repeat 5 times with different topics. E.g., 'Social media is addictive. In other words, people find it very difficult to put their phones down.'",tm:"3 min"},

}

// ── Practice Tab ──────────────────────────────────────

function PracticeTab(){
  const [answers,setAnswers]=useState({});
  const [show,setShow]=useState({});

  function select(qi,oi){
    if(answers[qi]!==undefined)return;
    setAnswers(a=>({...a,[qi]:oi}));
    setShow(s=>({...s,[qi]:true}));
  }

  const correct=Object.entries(answers).filter(([qi,oi])=>Number(oi)===PRACTICE[Number(qi)].ans).length;
  const total=Object.keys(answers).length;

  return React.createElement('div',null,
    React.createElement('div',{style:{background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-lg)',padding:'1.25rem 1.5rem',marginBottom:'1rem',border:'0.5px solid var(--color-border-tertiary)'}},
      React.createElement('h2',{className:'g-serif',style:{margin:'0 0 6px',fontSize:20,fontWeight:600,color:'var(--color-text-primary)'}},`Paraphrasing Identification Quiz`),
      React.createElement('p',{style:{margin:'0 0 10px',fontSize:13.5,color:'var(--color-text-secondary)',lineHeight:1.65}},'Read each paraphrase example and identify which type — or which technique — is being used. After selecting an answer, the explanation will appear. Work through all 10 questions at your own pace.'),
      total>0&&React.createElement('div',{style:{display:'flex',gap:16,alignItems:'center'}},
        React.createElement('div',{style:{fontSize:13,color:'var(--color-text-secondary)'}},`Progress: ${total}/10 answered`),
        React.createElement('div',{style:{fontSize:13,fontWeight:600,color:correct===total&&total===10?'#0F6E56':'var(--color-text-primary)'}},`Score: ${correct}/${total}`)
      )
    ),
    PRACTICE.map((q,qi)=>{
      const chosen=answers[qi];
      const revealed=show[qi];
      const isCorrect=chosen===q.ans;
      return React.createElement('div',{key:qi,className:'g-card',style:{marginBottom:'0.75rem'}},
        React.createElement('div',{style:{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--color-text-tertiary)',marginBottom:8}},`Question ${qi+1} of 10`),
        React.createElement('pre',{style:{margin:'0 0 14px',fontFamily:"'DM Sans',system-ui,sans-serif",fontSize:13.5,color:'var(--color-text-primary)',lineHeight:1.7,whiteSpace:'pre-wrap',background:'var(--color-background-secondary)',padding:'10px 14px',borderRadius:'var(--border-radius-md)'}},q.q),
        React.createElement('div',null,q.opts.map((opt,oi)=>{
          let bg='transparent',border='0.5px solid var(--color-border-tertiary)',col='var(--color-text-primary)';
          if(revealed){
            if(oi===q.ans){bg='#E1F5EE';border='1px solid #5DCAA5';col='#085041';}
            else if(oi===chosen&&!isCorrect){bg='#FCEBEB';border='1px solid #F09595';col='#A32D2D';}
          }
          return React.createElement('div',{key:oi,className:'g-quiz-opt',onClick:()=>select(qi,oi),style:{background:bg,border,cursor:chosen!==undefined?'default':'pointer'}},
            React.createElement('div',{style:{width:20,height:20,borderRadius:'50%',border:`1.5px solid ${revealed&&oi===q.ans?'#085041':revealed&&oi===chosen&&!isCorrect?'#A32D2D':'var(--color-border-secondary)'}`,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:revealed&&oi===q.ans?'#085041':revealed&&oi===chosen&&!isCorrect?'#A32D2D':'var(--color-text-tertiary)'}},chosen!==undefined&&oi===q.ans?'✓':chosen!==undefined&&oi===chosen&&!isCorrect?'✗':''),
            React.createElement('span',{style:{fontSize:13,color:col}},opt)
          );
        })),
        revealed&&React.createElement('div',{style:{marginTop:12,padding:'10px 14px',background:isCorrect?'#E1F5EE':'#FAEEDA',borderRadius:'var(--border-radius-md)',borderLeft:`3px solid ${isCorrect?'#0F6E56':'#854F0B'}`}},
          React.createElement('div',{style:{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:isCorrect?'#085041':'#633806',marginBottom:4}},isCorrect?'Correct!':'Not quite — here is why:'),
          React.createElement('p',{style:{margin:0,fontSize:13,color:'var(--color-text-secondary)',lineHeight:1.65}},q.exp)
        )
      );
    }),
    total===10&&React.createElement('div',{style:{textAlign:'center',padding:'2rem',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-lg)',marginTop:'0.5rem'}},
      React.createElement('div',{className:'g-serif',style:{fontSize:24,fontWeight:600,color:'var(--color-text-primary)',marginBottom:8}},`${correct}/10 Correct`),
      React.createElement('p',{style:{margin:'0 0 12px',fontSize:13.5,color:'var(--color-text-secondary)',lineHeight:1.65}},correct>=8?'Excellent work. You can identify paraphrase types reliably — now focus on producing them fluently in your own answers.':correct>=5?'Good progress. Review the types you found difficult and revisit the relevant module before re-attempting.':'Keep studying — work through each type module carefully, then try the quiz again. Identification skills build with repeated exposure.'),
      React.createElement('button',{onClick:()=>{setAnswers({});setShow({});}},`Retry quiz`)
    )
  );
}

      React.createElement('p',{style:{margin:0,fontSize:13.5,color:'var(--color-text-secondary)'}},`Five types · Worked examples · Drills · Self-check rubrics · Practice quiz`)
    ),
    React.createElement('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:'1.25rem'}},
      TABS.map(t=>React.createElement('button',{key:t.id,onClick:()=>setTab(t.id),className:'g-tab-btn',style:{border:tab===t.id?'1.5px solid var(--color-border-primary)':'0.5px solid var(--color-border-tertiary)',fontWeight:tab===t.id?600:400,background:tab===t.id?'var(--color-background-secondary)':'transparent',color:tab===t.id?'var(--color-text-primary)':'var(--color-text-secondary)'}},t.l))

    tab==='5'&&React.createElement(TypeTab,{num:5}),
    tab==='quickref'&&React.createElement(QuickRefTab),
    tab==='practice'&&React.createElement(PracticeTab)
  );

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
